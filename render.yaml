services:
  - type: web
    name: trading-partner-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -e .[dev]
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./data/research_assistant.db

  - type: worker
    name: trading-partner-worker
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -e .[dev]
    startCommand: python -m app.worker

  - type: web
    name: trading-partner-web
    runtime: node
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm run start

